name: Revalidate Content

on:
  schedule:
    # 매일 UTC 6시 = KST 15시
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Call revalidate API
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://jidonglab.com' }}
        run: |
          echo "Calling revalidate endpoint..."

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${SITE_URL}/api/revalidate" \
            -H "Content-Type: application/json" \
            --max-time 120)

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response:"
          cat response.json | jq . 2>/dev/null || cat response.json

          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::API returned ${HTTP_STATUS}"
            exit 1
          fi

          echo "Revalidation completed successfully"
