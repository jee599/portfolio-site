name: Sync Dev.to Articles

on:
  schedule:
    # 매일 UTC 1시 = KST 10시
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync-devto:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-devto API
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://jidonglab.com' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Calling Dev.to sync endpoint..."

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${SITE_URL}/api/sync-devto" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 120)

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response:"
          cat response.json | jq . 2>/dev/null || cat response.json

          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::API returned ${HTTP_STATUS}"
            exit 1
          fi

          echo "Dev.to sync completed successfully"
