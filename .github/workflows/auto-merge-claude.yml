name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR and merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let prNumber;

            // Check for existing open PR from this branch
            const { data: existingPRs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              base: 'main',
              state: 'open',
            });

            if (existingPRs.length > 0) {
              prNumber = existingPRs[0].number;
              console.log(`Found existing PR #${prNumber}`);
            } else {
              // Create new PR
              try {
                const { data: pr } = await github.rest.pulls.create({
                  owner, repo,
                  title: `Auto-merge: ${branch}`,
                  head: branch,
                  base: 'main',
                });
                prNumber = pr.number;
                console.log(`Created PR #${prNumber}`);
              } catch (e) {
                console.log(`Could not create PR: ${e.message}`);
                return;
              }
            }

            // Merge PR
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log(`Merged PR #${prNumber}`);
            } catch (e) {
              console.log(`Could not merge PR #${prNumber}: ${e.message}`);
              return;
            }

            // Delete branch
            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch ${branch}`);
            } catch (e) {
              console.log(`Could not delete branch: ${e.message}`);
            }
