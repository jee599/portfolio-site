name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge to main
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if branch has changes vs main
            try {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner, repo,
                basehead: `main...${branch}`,
              });
              if (comparison.total_commits === 0) {
                console.log('No new commits vs main, skipping');
                return;
              }
              console.log(`${comparison.total_commits} commits ahead of main`);
            } catch (e) {
              console.log(`Compare failed: ${e.message}`);
            }

            // Try creating a PR first
            let prNumber;
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo,
                title: `Auto-merge: ${branch}`,
                head: branch,
                base: 'main',
              });
              prNumber = pr.number;
              console.log(`Created PR #${prNumber}`);
            } catch (e) {
              console.log(`PR creation failed: ${e.message}`);
              // PR already exists (closed) - use direct merge API
              try {
                const result = await github.rest.repos.merge({
                  owner, repo,
                  base: 'main',
                  head: branch,
                  commit_message: `Auto-merge: ${branch}`,
                });
                console.log(`Direct merge successful: ${result.data.sha.slice(0, 7)}`);
              } catch (mergeErr) {
                console.log(`Direct merge also failed: ${mergeErr.message}`);
              }
              return;
            }

            // Merge the PR via squash
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log(`Squash-merged PR #${prNumber}`);
            } catch (e) {
              console.log(`PR merge failed: ${e.message}`);
              return;
            }

            // Clean up branch
            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch ${branch}`);
            } catch (e) {
              console.log(`Branch deletion failed: ${e.message}`);
            }
