name: Generate Build Log

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'src/content/build-logs/**'
      - '.github/workflows/**'
  schedule:
    # Run daily at 21:00 UTC (6:00 AM KST next day) to batch accumulated commits
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  generate-build-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Generate build logs from all registered projects
        uses: actions/github-script@v7
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const thisRepo = context.repo.repo;
            const today = new Date().toISOString().split('T')[0];
            const anthropicApiKey = process.env.ANTHROPIC_API_KEY;

            // Skip patterns for auto-generated commits
            const skipPatterns = ['[skip-log]', 'Auto-merge:', 'auto-generate AI news', 'auto: sync from', 'Merge remote-tracking', 'Merge pull request'];

            // ─── Read registered projects from YAML files (simple regex, no js-yaml) ───
            const projectsDir = 'src/content/projects';
            const projectFiles = fs.readdirSync(projectsDir).filter(f => f.endsWith('.yaml') || f.endsWith('.yml'));

            const projects = projectFiles.map(f => {
              const content = fs.readFileSync(path.join(projectsDir, f), 'utf8');
              const slug = f.replace(/\.(yaml|yml)$/, '');
              const titleMatch = content.match(/^title:\s*["']?(.+?)["']?\s*$/m);
              const githubMatch = content.match(/^github:\s*["']?https:\/\/github\.com\/([^/\s"']+)\/([^/\s"']+)["']?\s*$/m);
              return {
                slug,
                title: titleMatch ? titleMatch[1] : slug,
                github: githubMatch ? { owner: githubMatch[1], repo: githubMatch[2] } : null,
              };
            }).filter(p => p.github);

            console.log(`Found ${projects.length} projects: ${projects.map(p => p.slug).join(', ')}`);

            // ─── Claude API 호출 함수 ───
            async function generateWithClaude(commitData) {
              if (!anthropicApiKey) {
                console.log('ANTHROPIC_API_KEY not set, falling back to basic format');
                return null;
              }

              const prompt = `당신은 AI 도구를 활용한 개발 과정을 공유하는 기술 블로거입니다. 아래 커밋 데이터를 분석해서 **읽을 가치가 있는 블로그 포스트**를 작성하세요.

단순 커밋 나열이 아니라, **작업 과정에서 배운 것, 사용한 방법론, AI 활용 팁**을 중심으로 쓴다.

## 문체 규칙 (매우 중요)

- **건조한 반말** 사용: "~한다", "~했다", "~이다" (존댓말 절대 금지)
- 짧고 직관적인 문장. 불필요한 수식어 없이 핵심만
- 기술 용어는 번역하지 않는다 (e.g., commit, deploy, refactor 그대로)
- 감탄사, 이모지 사용 금지
- 변수명, 파일명, CSS값, CLI 명령어는 반드시 backtick으로 감싼다

## 문체 예시

좋은 예:
- "Three.js 배경을 넣었더니 텍스트가 다 뭉개졌다."
- "CSS 변수 4개를 \`rgba(13,11,20,0.72)\` 계열로 올렸다."
- "과감하게 잘라야 할 때가 있다."
- "한 줄이면 끝. **36줄 → 0줄.**"
- "\`globals.css\` 한 파일에서 다 처리했다."

나쁜 예:
- "오늘은 정말 유용한 작업을 진행했습니다." (존댓말 금지)
- "대박! 이거 완전 꿀팁!" (감탄사 금지)
- "다양한 개선 사항을 적용하였습니다." (존댓말+수식어 금지)

## 포스트 구조 (이 순서대로)

### 1. 도입부 (h2 없이 바로 시작)
- 오늘 뭘 했고, 왜 했는지 1~2줄로 요약

### 2. 작업 과정 섹션들 (h2)
- 커밋 데이터에서 **주요 작업 흐름**을 파악해서 2~4개 섹션으로 나눈다
- 각 섹션에서: 무엇이 문제였는지 → 어떻게 해결했는지 → 코드 예시
- 제목은 "~했다", "~잘랐다", "~바꿨다" 식 (행위 중심)

### 3. Claude 활용 팁 (h2: "Claude로 이렇게 작업했다" 또는 유사)
커밋 메시지와 변경 파일을 분석해서, 이런 작업에서 Claude Code / Claude를 어떻게 활용하면 좋은지 **구체적인 팁**을 제공한다:
- **프롬프트 예시**: 이 작업을 Claude에게 시킬 때 효과적인 프롬프트를 추정해서 코드블록으로 보여준다
- **Claude Code 사용법**: 관련된 Claude Code 기능 (slash commands, CLAUDE.md, hooks, MCP 등)
- **주의할 점**: AI에게 맡기면 안 되는 부분, 사람이 검증해야 하는 부분
- **작업 분할 전략**: 큰 작업을 어떻게 쪼개서 AI에게 시켰는지

예시:
\`\`\`
## Claude로 i18n 작업을 시키는 법

이런 프롬프트가 효과적이었다:

> "8개 locale 파일에서 key가 누락된 항목을 찾아서 영어 기준으로 번역해줘.
> 단, 고유명사는 번역하지 마."

핵심은 **제약 조건을 명시**하는 것이다. "번역해줘"만 쓰면 고유명사까지 번역해버린다.
\`\`\`

### 4. 커밋 로그 (HTML 형식)

<hr class="section-break">

<div class="commit-log">
<div class="commit-row"><span class="hash">커밋해시7자</span> <span class="msg">커밋 메시지</span></div>
</div>

### 5. 마무리 한 줄
- 작업에서 얻은 인사이트나 교훈 (반말)

## 커밋 데이터

${JSON.stringify(commitData, null, 2)}

## 출력

frontmatter 없이 마크다운 본문만 작성하세요. 제목(title)과 slug도 별도로 JSON 형태로 첫 줄에 제공하세요.

첫 줄 형식: <!-- META: {"title": "제목", "slug": "영문-kebab-case-slug"} -->

## 제목 규칙

제목은 **작업 내용 + 방법/인사이트**가 드러나야 한다.

좋은 예:
- "i18n 8개 언어 일괄 수정 — Claude에게 번역 시키는 프롬프트 패턴"
- "결제 페이지 paywall 구현기 — AI로 conversion 퍼널 설계하는 법"
- "SEO 랜딩 페이지 자동 생성 — Claude Code로 10개 페이지 30분 만에"
- "온보딩 UX 전면 개편 — 프롬프트 하나로 컴포넌트 6개 리팩토링"

나쁜 예:
- "작업 정리" (너무 일반적)
- "2026-03-09 사주앱 업데이트" (날짜+앱명만)
- "[사주 분석 앱] 새 기능 추가 외 8건" (커밋 카운트만)

제목에 날짜, [프로젝트명] 접두사, "외 N건" 같은 패턴은 쓰지 않는다.`;

              const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': anthropicApiKey,
                  'anthropic-version': '2023-06-01',
                },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-20250514',
                  max_tokens: 8000,
                  messages: [{ role: 'user', content: prompt }],
                }),
              });

              if (!response.ok) {
                const error = await response.text();
                console.error(`Claude API error: ${error}`);
                return null;
              }

              const data = await response.json();
              const text = data.content?.[0]?.text;
              return text || null;
            }

            // ─── Process each project ───
            for (const project of projects) {
              const { slug, title, github: gh } = project;

              // Find the most recent build log for this project to get the "since" date
              let lastLogDate = null;
              try {
                const { data: logFiles } = await github.rest.repos.getContent({
                  owner, repo: thisRepo, path: 'src/content/build-logs',
                });
                const projectLogs = logFiles
                  .filter(f => f.name.includes(slug) && f.name.endsWith('-ko.md'))
                  .map(f => f.name)
                  .sort()
                  .reverse();
                if (projectLogs.length > 0) {
                  const dateMatch = projectLogs[0].match(/^(\d{4}-\d{2}-\d{2})/);
                  if (dateMatch) lastLogDate = dateMatch[1];
                }
              } catch {
                // directory doesn't exist yet
              }

              // Fetch commits since last build log (or last 7 days if no log exists)
              const since = lastLogDate
                ? new Date(lastLogDate + 'T23:59:59Z').toISOString()
                : new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

              console.log(`[${slug}] Fetching commits since ${since} (last log: ${lastLogDate || 'none'})`);

              let recentCommits;
              try {
                const { data } = await github.rest.repos.listCommits({
                  owner: gh.owner,
                  repo: gh.repo,
                  sha: 'main',
                  since,
                  per_page: 100,
                });
                recentCommits = data;
              } catch (e) {
                console.log(`[${slug}] Failed to fetch commits: ${e.message}`);
                continue;
              }

              const relevantCommits = recentCommits.filter(c =>
                !skipPatterns.some(p => c.commit.message.includes(p))
              );

              if (relevantCommits.length === 0) {
                console.log(`[${slug}] No new commits since last build log`);
                continue;
              }

              // Publish threshold: 3+ commits accumulated since last build log
              if (relevantCommits.length < 3) {
                console.log(`[${slug}] Only ${relevantCommits.length} commits accumulated, waiting for 3+`);
                continue;
              }

              // Use today's date for the new log file, with a sequence number if needed
              let logPath = `src/content/build-logs/${today}-${slug}-ko.md`;
              try {
                await github.rest.repos.getContent({ owner, repo: thisRepo, path: logPath });
                // Today's log exists, add sequence number
                logPath = `src/content/build-logs/${today}-${slug}-2-ko.md`;
              } catch {
                // doesn't exist, use default path
              }

              console.log(`[${slug}] Found ${relevantCommits.length} commits`);

              // Analyze changed files
              const allFiles = new Set();
              let totalAdditions = 0;
              let totalDeletions = 0;
              const fileDiffs = [];

              for (const commit of relevantCommits.slice(0, 20)) {
                try {
                  const { data: detail } = await github.rest.repos.getCommit({
                    owner: gh.owner,
                    repo: gh.repo,
                    ref: commit.sha,
                  });
                  for (const file of detail.files || []) {
                    allFiles.add(file.filename);
                    totalAdditions += file.additions || 0;
                    totalDeletions += file.deletions || 0;
                    fileDiffs.push({
                      filename: file.filename,
                      status: file.status,
                      additions: file.additions,
                      deletions: file.deletions,
                    });
                  }
                } catch {
                  // skip
                }
              }

              // Build commit data for Claude API
              const commitData = {
                project: title,
                slug,
                date: today,
                commits: relevantCommits.map(c => ({
                  sha: c.sha.substring(0, 7),
                  message: c.commit.message.split('\n')[0],
                  author: c.commit.author?.name || 'unknown',
                })),
                stats: {
                  totalCommits: relevantCommits.length,
                  filesChanged: allFiles.size,
                  additions: totalAdditions,
                  deletions: totalDeletions,
                },
                changedFiles: Array.from(allFiles).slice(0, 20),
                fileDiffs: fileDiffs.slice(0, 30),
              };

              // Build tags
              const tagSet = new Set();
              for (const c of relevantCommits) {
                const match = c.commit.message.match(/^(feat|fix|refactor|chore):/i);
                if (match) tagSet.add(match[1].toLowerCase());
              }
              for (const f of allFiles) {
                if (f.endsWith('.astro')) tagSet.add('astro');
                if (f.endsWith('.ts') || f.endsWith('.tsx')) tagSet.add('typescript');
                if (f.endsWith('.py')) tagSet.add('python');
                if (f.endsWith('.css')) tagSet.add('css');
              }
              const tags = Array.from(tagSet).slice(0, 5);

              // Claude API로 풍부한 빌드 로그 생성
              let body = '';
              let logTitle = '';
              let logSlug = `${slug}`;

              const claudeResult = await generateWithClaude(commitData);

              if (claudeResult) {
                // META 태그에서 제목과 slug 추출
                const metaMatch = claudeResult.match(/<!--\s*META:\s*(\{.*?\})\s*-->/);
                if (metaMatch) {
                  try {
                    const meta = JSON.parse(metaMatch[1]);
                    logTitle = meta.title || '';
                    if (meta.slug) logSlug = meta.slug;
                  } catch {
                    // ignore parse error
                  }
                }
                // META 태그 제거한 본문
                body = claudeResult.replace(/<!--\s*META:.*?-->\n?/, '').trim();
              }

              // Claude API 실패 시 기본 포맷 fallback
              if (!body) {
                const commitsByType = { feat: [], fix: [], refactor: [], chore: [], other: [] };
                for (const c of relevantCommits) {
                  const msg = c.commit.message.split('\n')[0];
                  const match = msg.match(/^(feat|fix|refactor|chore|docs|style|test|ci):/i);
                  const type = match ? match[1].toLowerCase() : 'other';
                  const bucket = commitsByType[type] || commitsByType.other;
                  bucket.push(msg);
                }

                const dominantType = Object.entries(commitsByType)
                  .sort((a, b) => b[1].length - a[1].length)
                  .find(([_, v]) => v.length > 0);
                const typeLabels = {
                  feat: '새 기능 추가',
                  fix: '버그 수정',
                  refactor: '코드 리팩토링',
                  chore: '유지보수 작업',
                  other: '작업 정리',
                };
                logTitle = `[${title}] ${today} — ${typeLabels[dominantType?.[0]] || '작업 정리'} 외 ${relevantCommits.length}건`;

                const typeHeaders = { feat: '새로 추가한 것', fix: '고친 것', refactor: '리팩토링', chore: '기타 작업', other: '기타' };

                for (const [type, commits] of Object.entries(commitsByType)) {
                  if (commits.length === 0) continue;
                  body += `## ${typeHeaders[type]}\n\n`;
                  for (const msg of commits) {
                    body += `- ${msg.replace(/^(feat|fix|refactor|chore|docs|style|test|ci):\s*/i, '')}\n`;
                  }
                  body += '\n';
                }

                body += `## 숫자로 보는 오늘\n\n`;
                body += `- 커밋: ${relevantCommits.length}건\n`;
                body += `- 변경 파일: ${allFiles.size}개\n`;
                body += `- 추가: +${totalAdditions.toLocaleString()}줄 / 삭제: -${totalDeletions.toLocaleString()}줄\n\n`;

                body += `---\n\n*이 작업 로그는 커밋이 3건 이상 쌓이면 자동으로 생성된다.*\n`;
              }

              // Claude가 slug를 제공했으면 파일명에 반영
              const finalLogPath = claudeResult
                ? `src/content/build-logs/${today}-${logSlug}-ko.md`
                : logPath;

              const markdown = `---\ntitle: "${logTitle.replace(/"/g, '\\"')}"\nproject: "${slug}"\ndate: ${today}\nlang: ko\ntags: [${tags.join(', ')}]\n---\n\n${body}`;

              // Create file in portfolio-site repo
              const content = Buffer.from(markdown).toString('base64');
              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo: thisRepo,
                  path: finalLogPath,
                  message: `docs: auto-generate build log for ${slug} on ${today} [skip-log]`,
                  content,
                  branch: 'main',
                });
                console.log(`[${slug}] Created build log: ${finalLogPath} (${relevantCommits.length} commits)`);
              } catch (e) {
                console.log(`[${slug}] Failed to create build log: ${e.message}`);
              }
            }
