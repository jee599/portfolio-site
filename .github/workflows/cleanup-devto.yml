name: Cleanup Dev.to Articles

on:
  workflow_dispatch: # 수동 실행 전용

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup duplicate and low-quality Dev.to articles
        uses: actions/github-script@v7
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        with:
          script: |
            const devtoKey = process.env.DEVTO_API_KEY;
            if (!devtoKey) {
              console.log('DEVTO_API_KEY not set');
              return;
            }

            const headers = { 'api-key': devtoKey };

            // Fetch all published articles (paginated)
            let allArticles = [];
            let page = 1;
            while (true) {
              const res = await fetch(`https://dev.to/api/articles/me/published?per_page=100&page=${page}`, { headers });
              if (!res.ok) break;
              const batch = await res.json();
              if (batch.length === 0) break;
              allArticles.push(...batch);
              page++;
            }

            // Fetch unpublished too
            page = 1;
            while (true) {
              const res = await fetch(`https://dev.to/api/articles/me/unpublished?per_page=100&page=${page}`, { headers });
              if (!res.ok) break;
              const batch = await res.json();
              if (batch.length === 0) break;
              allArticles.push(...batch);
              page++;
            }

            console.log(`Total articles found: ${allArticles.length}`);

            // 1) 제목 중복 찾기 — 오래된 것을 unpublish
            const titleMap = new Map();
            for (const a of allArticles) {
              const key = a.title.trim();
              if (!titleMap.has(key)) {
                titleMap.set(key, []);
              }
              titleMap.get(key).push(a);
            }

            const toUnpublish = [];

            for (const [title, articles] of titleMap) {
              if (articles.length > 1) {
                // 가장 최근 것만 남기고 나머지 unpublish
                articles.sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at));
                for (let i = 1; i < articles.length; i++) {
                  toUnpublish.push({ id: articles[i].id, title: articles[i].title, reason: 'duplicate' });
                }
              }
            }

            // 2) 저품질 감지: 본문 200자 미만, 또는 frontmatter/raw markdown 노출
            for (const a of allArticles) {
              // body_markdown이 없으면 API에서 full article 가져오기
              let bodyLen = a.body_markdown?.length || 0;
              if (bodyLen === 0) {
                try {
                  const fullRes = await fetch(`https://dev.to/api/articles/${a.id}`, { headers });
                  if (fullRes.ok) {
                    const full = await fullRes.json();
                    bodyLen = full.body_markdown?.length || 0;

                    // frontmatter가 본문에 노출되는 경우 감지
                    const body = full.body_markdown || '';
                    if (body.startsWith('---') && body.includes('title:')) {
                      toUnpublish.push({ id: a.id, title: a.title, reason: 'raw-frontmatter-exposed' });
                      continue;
                    }
                  }
                } catch {}
              }

              if (bodyLen > 0 && bodyLen < 200) {
                toUnpublish.push({ id: a.id, title: a.title, reason: 'too-short' });
              }
            }

            // 중복 제거 (같은 ID가 여러 이유로 걸릴 수 있음)
            const uniqueIds = new Set();
            const uniqueToUnpublish = toUnpublish.filter(item => {
              if (uniqueIds.has(item.id)) return false;
              uniqueIds.add(item.id);
              return true;
            });

            console.log(`\nArticles to unpublish: ${uniqueToUnpublish.length}`);

            // Unpublish
            let unpublished = 0;
            for (const item of uniqueToUnpublish) {
              console.log(`  Unpublishing [${item.reason}]: "${item.title}" (id: ${item.id})`);
              try {
                const res = await fetch(`https://dev.to/api/articles/${item.id}`, {
                  method: 'PUT',
                  headers: {
                    'Content-Type': 'application/json',
                    'api-key': devtoKey,
                  },
                  body: JSON.stringify({
                    article: { published: false },
                  }),
                });

                if (res.ok) {
                  console.log(`    → Unpublished`);
                  unpublished++;
                } else {
                  const err = await res.text();
                  console.log(`    → Failed: ${res.status} ${err}`);
                }

                await new Promise(r => setTimeout(r, 2000));
              } catch (e) {
                console.log(`    → Error: ${e.message}`);
              }
            }

            console.log(`\nDone: ${unpublished}/${uniqueToUnpublish.length} unpublished`);
