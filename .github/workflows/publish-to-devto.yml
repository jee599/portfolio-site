name: Publish blog posts to Dev.to

on:
  push:
    branches: [main]
    paths:
      - 'src/content/ai-news/**'
      - 'src/content/blog/**'
  workflow_dispatch: # 수동 실행

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish new posts to Dev.to
        uses: actions/github-script@v7
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL || 'https://jidonglab.com' }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const devtoKey = process.env.DEVTO_API_KEY;
            const siteUrl = process.env.SITE_URL;
            if (!devtoKey) {
              console.log('DEVTO_API_KEY not set, skipping');
              return;
            }

            // Get existing Dev.to articles to avoid duplicates
            const existingRes = await fetch('https://dev.to/api/articles/me/published?per_page=100', {
              headers: { 'api-key': devtoKey },
            });
            const existing = existingRes.ok ? await existingRes.json() : [];
            const existingUrls = new Set(existing.map(a => a.canonical_url).filter(Boolean));
            const existingTitles = new Set(existing.map(a => a.title));
            console.log(`Found ${existing.length} existing Dev.to articles`);

            // ai-news + blog → DEV.to에 발행
            const collections = [
              { dir: 'src/content/ai-news', urlPrefix: '/ai-news', type: 'ai-news' },
              { dir: 'src/content/blog', urlPrefix: '/blog', type: 'blog' },
            ];

            // Dev.to 태그 변환: 하이픈 제거, 영문+숫자만, 소문자, 최대 20자
            function sanitizeTag(tag) {
              return tag
                .toLowerCase()
                .replace(/-/g, '')        // ai-news → ainews
                .replace(/[^a-z0-9]/g, '') // 한글/특수문자 제거
                .slice(0, 20);
            }

            let published = 0;
            let skipped = 0;

            for (const col of collections) {
              if (!fs.existsSync(col.dir)) {
                console.log(`Directory ${col.dir} not found, skipping`);
                continue;
              }

              const files = fs.readdirSync(col.dir).filter(f => f.endsWith('.md') || f.endsWith('.mdx'));
              console.log(`\n[${col.type}] Found ${files.length} files in ${col.dir}`);

              for (const file of files) {
                const content = fs.readFileSync(path.join(col.dir, file), 'utf-8');

                // Parse frontmatter
                const fmMatch = content.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!fmMatch) {
                  console.log(`  Skip (no frontmatter): ${file}`);
                  continue;
                }

                const frontmatter = fmMatch[1];
                const body = fmMatch[2].trim();

                // Skip empty body
                if (!body || body.length < 50) {
                  console.log(`  Skip (empty/short body): ${file}`);
                  continue;
                }

                // Extract fields
                const titleMatch = frontmatter.match(/title:\s*"([^"]+)"/);
                if (!titleMatch) {
                  console.log(`  Skip (no title): ${file}`);
                  continue;
                }

                const title = titleMatch[1];
                const tagsMatch = frontmatter.match(/tags:\s*\[([^\]]+)\]/);
                const descMatch = frontmatter.match(/description:\s*"([^"]+)"/);
                const summaryMatch = frontmatter.match(/summary:\s*"([^"]+)"/);
                const sourceMatch = frontmatter.match(/source:\s*"?([^"\n]+)"?/);
                const langMatch = frontmatter.match(/lang:\s*"?([^"\n\s]+)"?/);

                // Skip posts that came from Dev.to originally
                const source = sourceMatch ? sourceMatch[1].trim() : '';
                if (source === 'devto-migration' || source === 'devto') {
                  skipped++;
                  continue;
                }

                // ai-news 컬렉션: placeholder 파일 스킵
                if (col.type === 'ai-news' && file === 'placeholder.md') {
                  skipped++;
                  continue;
                }

                // Build canonical URL
                const slug = file.replace(/\.(md|mdx)$/, '');
                const canonicalUrl = `${siteUrl}${col.urlPrefix}/${slug}`;

                // Skip if already published
                if (existingUrls.has(canonicalUrl) || existingTitles.has(title)) {
                  skipped++;
                  continue;
                }

                // Parse and sanitize tags for Dev.to
                let tags = [];
                if (tagsMatch) {
                  tags = tagsMatch[1]
                    .split(',')
                    .map(t => t.trim().replace(/['"]/g, ''))
                    .map(t => sanitizeTag(t))
                    .filter(t => t.length > 0)
                    .slice(0, 4);
                }

                // Add collection type as tag if not present
                const typeTag = sanitizeTag(col.type);
                if (!tags.includes(typeTag) && tags.length < 4) {
                  tags.push(typeTag);
                }

                // Ensure at least one tag
                if (tags.length === 0) {
                  tags = ['ai'];
                }

                // description 보장: description > summary > 본문 앞 100자
                let description = descMatch ? descMatch[1] : (summaryMatch ? summaryMatch[1] : undefined);
                if (!description && body.length > 0) {
                  description = body.replace(/[#*>\-\[\]`]/g, '').trim().slice(0, 150).trim() + '...';
                }

                // series 결정: 컬렉션 타입별 시리즈 그룹
                const modelMatch = frontmatter.match(/model:\s*"?([^"\n\s]+)"?/);
                const projectMatch = frontmatter.match(/project:\s*"?([^"\n\s]+)"?/);
                let series;
                if (col.type === 'ai-news' && modelMatch) {
                  const modelSeries = { claude: 'AI News — Claude', gemini: 'AI News — Gemini', gpt: 'AI News — GPT', etc: 'AI News — Open Source & Others' };
                  series = modelSeries[modelMatch[1]] || 'AI News';
                } else if (col.type === 'build-log' && projectMatch) {
                  series = `Build Log — ${projectMatch[1]}`;
                } else if (col.type === 'tip') {
                  series = 'AI Dev Tips';
                }

                // jidonglab 푸터 링크 강제 추가
                const lang = langMatch ? langMatch[1].trim() : 'ko';
                const footer = lang === 'en'
                  ? `\n\n---\n\n> 📌 Originally published at [Jidong Lab](${canonicalUrl})\n> More AI news and dev logs → [jidonglab.com](${siteUrl})`
                  : `\n\n---\n\n> 📌 원문: [Jidong Lab](${canonicalUrl})\n> AI 소식과 개발 로그 → [jidonglab.com](${siteUrl})`;

                const bodyWithFooter = body + footer;

                try {
                  const res = await fetch('https://dev.to/api/articles', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'api-key': devtoKey,
                    },
                    body: JSON.stringify({
                      article: {
                        title,
                        body_markdown: bodyWithFooter,
                        published: true,
                        tags,
                        canonical_url: canonicalUrl,
                        description,
                        ...(series ? { series } : {}),
                      },
                    }),
                  });

                  if (res.ok) {
                    const data = await res.json();
                    console.log(`  Published: "${title}" → ${data.url} [tags: ${tags.join(', ')}]`);
                    published++;
                  } else {
                    const err = await res.text();
                    console.log(`  Failed: "${title}" — ${res.status}: ${err}`);
                  }

                  // Rate limit: Dev.to allows ~10 req/30s
                  await new Promise(r => setTimeout(r, 3000));
                } catch (e) {
                  console.log(`  Error publishing "${title}": ${e.message}`);
                }
              }
            }

            console.log(`\nDone: ${published} published, ${skipped} skipped`);

            console.log('Done.');
