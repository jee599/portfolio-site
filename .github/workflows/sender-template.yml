# =============================================================
# TEMPLATE: Copy this to your SOURCE repos (e.g., saju, trading-bot)
# Place at: .github/workflows/sync-build-log.yml
#
# Requirements:
#   1. Repository secret PORTFOLIO_PAT with repo scope
#      (Settings > Secrets > Actions > New repository secret)
#   2. Build logs generated locally by husky pre-push hook
#      and committed to build-logs/ directory in the source repo
# =============================================================

name: Sync Build Logs to Portfolio

on:
  push:
    branches: [main, master]
    paths:
      - 'build-logs/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new/changed build logs
        id: find
        run: |
          # Get build log files changed in this push
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'build-logs/' 2>/dev/null || echo "")
          if [ -z "$FILES" ]; then
            echo "No build log changes found"
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "Found changed files:"
            echo "$FILES"
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch to portfolio-site
        if: steps.find.outputs.has_files == 'true'
        env:
          PORTFOLIO_PAT: ${{ secrets.PORTFOLIO_PAT }}
        run: |
          # Build JSON payload with file contents
          PAYLOAD='{"event_type":"sync-build-log","client_payload":{"project":"${{ github.event.repository.name }}","files":{}}}'

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            filename=$(basename "$file")
            content=$(jq -Rs . < "$file")
            PAYLOAD=$(echo "$PAYLOAD" | jq --arg f "$filename" --argjson c "$content" '.client_payload.files[$f] = $c')
          done <<< "${{ steps.find.outputs.files }}"

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PORTFOLIO_PAT}" \
            https://api.github.com/repos/jee599/portfolio-site/dispatches \
            -d "$PAYLOAD"

          echo "Dispatched build logs to portfolio-site"
